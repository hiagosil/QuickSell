{% extends "base.html" %}
{% block title %}Entrar — QuickSell{% endblock %}

{% block content %}
<div class="page-sm">
  <div style="text-align:center; margin-bottom:2rem;">
    <h1 style="font-size:1.6rem;">Bem-vindo de volta</h1>
    <p class="text-muted mt-1">Entre na sua conta para acessar suas lojas.</p>
  </div>

  <div class="card">
    <form action="/auth/login" method="post">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="voce@email.com" required />
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full mt-2">Entrar</button>
    </form>
  </div>

  <p class="text-center text-muted mt-2" style="font-size:0.88rem;">
    Não tem conta? <a href="/auth/register">Criar conta grátis</a>
  </p>
</div>
{% endblock %}
